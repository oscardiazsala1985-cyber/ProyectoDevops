# ==============================================================================
# docker-compose.yml — Entorno local completo
# Levanta la app + Redis simulando la arquitectura AWS en tu máquina
# Modo dummies: con un solo comando tienes todo corriendo localmente
# Uso: docker-compose up --build
# ==============================================================================

version: "3.9"

services:

  # ── Aplicación principal ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sre-process-app
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NODE_ENV: "development"
      REDIS_HOST: "redis"        # Nombre del servicio Redis en la red Docker
      REDIS_PORT: "6379"
      REDIS_TTL_SECONDS: "60"
      BUCKET_NAME: "local-results-bucket"  # Mock local — no usa S3 real
      APP_VERSION: "1.0.0"
    depends_on:
      redis:
        condition: service_healthy  # Espera a que Redis esté listo
    networks:
      - sre-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Redis (caché en memoria) ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sre-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data          # Persistencia del caché entre reinicios
    networks:
      - sre-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Redis Commander (UI visual para Redis) ──────────────────────────────────
  # Modo dummies: es un panel web donde puedes ver las keys de Redis en el navegador
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sre-redis-ui
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      - redis
    networks:
      - sre-network
    restart: unless-stopped

# ── Volúmenes persistentes ────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local

# ── Red interna ───────────────────────────────────────────────────────────────
networks:
  sre-network:
    driver: bridge
