# ==============================================================================
# ci.yml — Pipeline de Integración Continua (CI)
# Se ejecuta en CADA pull request y push a cualquier rama
# este pipeline lo revisa automáticamente — como un inspector de calidad
# Punto 11 del reto: Buenas prácticas de CI/CD
# ==============================================================================

name: 🔍 CI — Validación y Pruebas

on:
  push:
    branches: ["**"]          # Cualquier rama
  pull_request:
    branches: [main, develop]

jobs:
  # ── Job 1: Lint y formato de código ────────────────────────────────────────
  lint:
    name: 🎨 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lambda/package.json

      - name: Instalar dependencias
        run: npm install
        working-directory: lambda

      - name: Verificar formato (si ESLint está configurado)
        run: |
          if [ -f ".eslintrc*" ] || grep -q '"eslint"' lambda/package.json 2>/dev/null; then
            npm run lint
          else
            echo "ESLint no configurado — skipping"
          fi
        working-directory: lambda
        continue-on-error: true

  # ── Job 2: Pruebas unitarias e integración ─────────────────────────────────
  test:
    name: 🧪 Tests Unitarios e Integración
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lambda/package.json

      - name: Instalar dependencias
        run: npm install
        working-directory: lambda

      - name: Ejecutar tests con cobertura
        run: npm test
        working-directory: lambda
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_TTL_SECONDS: "60"
          BUCKET_NAME: test-bucket

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: lambda/coverage/
          retention-days: 7

  # ── Job 3: Build Docker ────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false           # Solo build, sin push en CI
          tags: sre-process-service:${{ github.sha }}
          cache-from: type=gha  # Cache de GitHub Actions
          cache-to: type=gha,mode=max

      - name: Verificar imagen construida
        run: docker images | grep sre-process-service

  # ── Job 4: Validación Terraform ────────────────────────────────────────────
  terraform-validate:
    name: 🏗️ Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true  # No falla el pipeline por formato

      - name: Terraform Init (sin backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # ── Job 5: Security Scan ───────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: tfsec — Análisis de seguridad Terraform
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true   # No bloquea el pipeline, solo reporta
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — Escaneo de vulnerabilidades en Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          exit-code: "0"        # No bloquea, solo informa
          format: "table"

  # ── Notificación de fallo ──────────────────────────────────────────────────
  notify-failure:
    name: 📢 Notificar Fallo
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build, terraform-validate]
    if: failure()
    steps:
      - name: Notificación de fallo en CI
        run: |
          echo "❌ CI Pipeline falló en rama ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Ver detalles: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        # En producción, reemplazar con:
        # uses: 8398a7/action-slack@v3
        # with:
        #   status: failure
        #   webhook_url: ${{ secrets.SLACK_WEBHOOK }}
