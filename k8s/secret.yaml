# ==============================================================================
# secret.yaml — Variables sensibles cifradas en base64
# Modo dummies: es como una caja fuerte dentro del cluster para contraseñas
# IMPORTANTE: En producción estos valores se gestionan con AWS Secrets Manager
# o External Secrets Operator, NUNCA se hardcodean en git
#
# Para generar un valor base64:  echo -n "mi-password" | base64
# Para decodificar:              echo "bWktcGFzc3dvcmQ=" | base64 -d
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: sre-app-secrets
  namespace: sre-process-service
  labels:
    app: sre-process-service
type: Opaque
data:
  # Estos son valores de EJEMPLO — reemplazar con valores reales codificados en base64
  # DB_PASSWORD: <base64 del password real>
  # REDIS_AUTH_TOKEN: <base64 del token real>
  DB_PASSWORD: Y2hhbmdlbWUxMjM=    # changeme123 — SOLO PARA DEV
